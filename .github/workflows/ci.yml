# Intégration continue : valide le JSON, vérifie les sources (url + date + statut),
# contrôle la syntaxe des scripts et exécute un test de fumée des générateurs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Valider tous les fichiers JSON
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            let errors = 0;
            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                if (entry.name === "node_modules" || entry.name.startsWith(".git")) continue;
                const p = path.join(dir, entry.name);
                if (entry.isDirectory()) { walk(p); continue; }
                if (!entry.name.endsWith(".json")) continue;
                try { JSON.parse(fs.readFileSync(p, "utf8")); console.log("OK  " + p); }
                catch (e) { console.error("FAIL " + p + " : " + e.message); errors++; }
              }
            }
            walk(".");
            process.exit(errors ? 1 : 0);
          '

      - name: Vérifier les sources (url + date + statut)
        run: node scripts/check-sources.js

      - name: Vérifier la syntaxe des scripts
        run: |
          for s in scripts/*.js; do
            echo "node --check $s"
            node --check "$s"
          done

      - name: Test de fumée — génération des états financiers
        run: node scripts/generate-statements.js
